services:
  postgres:
    image: postgres:15-alpine
    container_name: angotest_dj_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web_network  # Cambiado: usa la red compartida
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]  # ← Añade -d ${DB_NAME}
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env       

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: angotest_dj_backend
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: production
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS}
      AI_TEMPERATURE: ${AI_TEMPERATURE}
      AI_TIMEOUT: ${AI_TIMEOUT}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
    networks:
      - web_network  # Cambiado: usa la red compartida
    expose:
      - "8000"  # Expone internamente para el proxy
    env_file:
      - .env      

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: angotest_dj_frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "80"  # Solo interno, no expuesto al host
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - web_network  # Cambiado: usa la red compartida
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  static_volume:
  media_volume:
  postgres_data:

# Usa la red externa compartida
networks:
  web_network:
    external: true  # La red debe existir previamente
