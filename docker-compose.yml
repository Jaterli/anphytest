
services:

  postgres:
    image: postgres:15-alpine
    container_name: angotest_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - angotest_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: angotest_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS}
      AI_TEMPERATURE: ${AI_TEMPERATURE}
      AI_TIMEOUT: ${AI_TIMEOUT}
      ENV: production
    networks:
      - angotest_network
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: angotest_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - angotest_network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  postgres_data:

networks:
  angotest_network:
    driver: bridge


