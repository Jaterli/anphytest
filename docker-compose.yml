services:
  postgres:
    image: postgres:15-alpine
    container_name: angotest_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web_network  # Cambiado: usa la red compartida
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: angotest_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS}
      AI_TEMPERATURE: ${AI_TEMPERATURE}
      AI_TIMEOUT: ${AI_TIMEOUT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      ENV: production
    networks:
      - web_network  # Cambiado: usa la red compartida
    # ELIMINADO: puerto expuesto - ahora solo interno
    # ports:
    #   - "8081:8080"
    expose:
      - "8080"  # Expone internamente para el proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: angotest_frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "80"  # Solo interno, no expuesto al host
    # ELIMINADO: Los puertos ahora los maneja el reverse proxy
    # ports:
    #   - "8080:80"
    #   - "8443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - web_network  # Cambiado: usa la red compartida
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  postgres_data:
    # El volumen mantiene su nombre, no necesita red

# ELIMINADA: red local angotest_network
# Usa la red externa compartida
networks:
  web_network:
    external: true  # La red debe existir previamente